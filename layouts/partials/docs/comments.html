{{ if .Site.Params.comments.waline.serverURL }}
{{- $theme := default "auto" .Site.Params.BookTheme -}}
<link rel="stylesheet" href="https://unpkg.com/waline@latest/dist/waline.css" />
<div id="waline"></div>
<script type="module">
  import { init } from 'https://unpkg.com/waline@latest/dist/waline.mjs';
  init({
    el: '#waline',
    serverURL: '{{ .Site.Params.comments.waline.serverURL }}',
    lang: '{{ default "zh-CN" .Site.Params.comments.waline.lang }}',
    dark: {{ if eq $theme "dark" }}'html'{{ else if eq $theme "auto" }}'auto'{{ else }}false{{ end }},
    path: window.location.pathname,
  });
</script>
{{ end }}
