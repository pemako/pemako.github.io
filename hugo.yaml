baseURL: https://pemako.cn/
languageCode: zh-cn
title: pemako
theme: hugo-book

enableInlineShortcodes: true
enableRobotsTXT: true
enableEmoji: true

params:
  env: production
  BookSection: docs
  BookTheme: light
  BookToC: true
  BookSearch: true
  BookComments: true
  BookCollapseSection: true
  BookRepo: https://github.com/pemako/pemako.github.io
  BookDateFormat: "2006-01-02"

  comments:
    waline:
      serverURL: "https://your-waline-server.vercel.app"  # 替换为你的 Waline 服务地址
      lang: "zh-CN"
