  <h1>使用vim进行多行折叠 <small></small></h1>

  <div class="span12">  
    <div id="article">
    <ul>
  <li>有下面一份文件内如如下,把文件内容保存为一行有如下方法</li>
</ul>

<div class="highlighter-rouge"><pre class="highlight"><code>name,
age,
sex,
email
</code></pre>
</div>

<ul>
  <li>:%j 或 :%j!(不会再行尾添加空格)</li>
  <li>:1,$j</li>
  <li>:ggVGJ</li>
  <li>:%s/\n//g</li>
  <li>qqJ@qq@q</li>
</ul>
